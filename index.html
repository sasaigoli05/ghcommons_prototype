<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Global Health Data Lake MVP</title>
  <link rel="stylesheet" href="../dashboard/styles.css" />
</head>
<body>
  <header>
    <h1>Global Health Data Lake MVP</h1>
    <p>Three NGOs, three formats, one FHIR-like view.</p>
  </header>

  <main>
    <section id="summary">
      <h2>Standardized Cases</h2>
      <table id="cases-table">
        <thead>
          <tr>
            <th>Case ID</th>
            <th>Country</th>
            <th>Age</th>
            <th>Condition</th>
            <th>Treatment Date</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </section>

    <section id="chatbot">
      <h2>Dummy Navigator</h2>
      <div class="chat-window">
        <div class="messages" id="messages">
          <div class="message bot">Hi! I am a mock assistant. Type a question about NTD cases and I'll suggest where to look in the data.</div>
        </div>
        <div class="chat-input">
          <input id="chat-text" placeholder="e.g., show me cases from Sierra Leone" />
          <button id="chat-send">Send</button>
        </div>
      </div>
    </section>
  </main>

  <script src="../dashboard/app.js"></script>
</body>
</html>
